<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA · 新智汇 — SOP Workspace</title>
<style>
:root{--navy:#0A1F44;--gold:#C9A84C;--bg:#F4F6FB;--surface:#fff;--border:#E2E8F0;--text:#1A202C;--muted:#718096;--subtle:#A0AEC0;--green:#22C55E;--amber:#F59E0B;--red:#EF4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.topbar{background:var(--navy);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.brand{color:var(--gold);font-size:14px;font-weight:700;}
.brand span{color:rgba(255,255,255,.35);font-weight:400;font-size:11px;margin-left:8px;}
.top-r{display:flex;align-items:center;gap:12px;}
.ts{color:rgba(255,255,255,.5);font-size:11px;}
.ts b{color:#fff;}
.lang-btn{font-size:11px;color:rgba(255,255,255,.7);cursor:pointer;padding:3px 10px;border-radius:6px;border:0.5px solid rgba(255,255,255,.3);font-weight:500;background:transparent;}
.lang-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
.role-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);padding:4px 12px;border-radius:20px;}
.rp-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.rp-name{font-size:12px;color:#fff;font-weight:500;}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 52px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;padding-bottom:16px;}
.sb-head{padding:12px 14px 4px;font-size:10px;font-weight:700;color:var(--subtle);text-transform:uppercase;letter-spacing:.5px;}
.rb{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;}
.rb:hover{background:var(--bg);}
.rb.active{background:var(--bg);}
.rb-ic{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.rb-inf{flex:1;min-width:0;}
.rb-nm{font-size:12px;font-weight:600;}
.rb-pc{font-size:10px;color:var(--muted);}
.rb-bar{height:2px;background:var(--border);border-radius:1px;margin-top:3px;overflow:hidden;}
.rb-fill{height:100%;border-radius:1px;transition:width .3s;}
.sb-div{height:1px;background:var(--border);margin:6px 12px;}
.sb-sum{padding:8px 12px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px;}
.sc{background:var(--bg);border-radius:7px;padding:7px;text-align:center;}
.sc-n{font-size:17px;font-weight:600;}
.sc-l{font-size:10px;color:var(--muted);}
.main{padding:20px;overflow-y:auto;}
.rh{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:14px;}
.rh-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rh-nm{font-size:17px;font-weight:700;margin-bottom:3px;}
.rh-sub{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:7px;}
.stk{display:flex;gap:4px;flex-wrap:wrap;}
.stk-t{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600;}
.tb{display:flex;gap:7px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.tbtn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;}
.tbtn:hover{background:var(--bg);}
.tbtn.pr{background:var(--navy);color:var(--gold);border-color:var(--navy);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:13px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center;}
.stat-n{font-size:20px;font-weight:700;}
.stat-l{font-size:10px;color:var(--muted);margin-top:1px;}
.pb{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:13px;}
.pb-m{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px;}
.pb-t{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.pb-f{height:100%;border-radius:3px;transition:width .4s;}
.act-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 13px;margin-bottom:13px;}
.act-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.act-ttl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.act-btns{display:flex;gap:4px;}
.asmb{font-size:10px;padding:2px 8px;border-radius:5px;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;}
.asmb.r{border-color:#FECACA;color:var(--red);}
.act-list{display:flex;flex-direction:column;gap:3px;max-height:70px;overflow-y:auto;}
.act-it{font-size:11px;color:var(--muted);display:flex;gap:5px;align-items:flex-start;}
.act-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:4px;}
.act-tm{font-size:10px;color:var(--subtle);margin-left:auto;white-space:nowrap;}
.pain-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;padding:9px 13px;background:var(--surface);border:1px solid var(--border);border-radius:10px;align-items:center;}
.pl{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;margin-right:3px;}
.pt{font-size:11px;padding:2px 8px;border-radius:5px;background:#FFFBEB;color:#92400E;border:1px solid #FCD34D;}
.stabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;}
.stab{font-size:11px;padding:4px 10px;border-radius:20px;color:#fff;font-weight:500;}
.cards{display:flex;flex-direction:column;gap:8px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:box-shadow .15s;}
.card:hover{box-shadow:0 2px 10px rgba(0,0,0,.06);}
.ch{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;}
.sn{min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px;}
.si{flex:1;}
.st2{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.4;}
.sw{font-size:11px;color:var(--muted);}
.sr{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.badge{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500;white-space:nowrap;}
.b-done{background:#D1FAE5;color:#065F46;}
.b-wip{background:#FEF3C7;color:#92400E;}
.b-todo{background:#F1F5F9;color:var(--muted);}
.chev{font-size:11px;color:var(--subtle);transition:transform .15s;display:inline-block;}
.chev.op{transform:rotate(90deg);}
.ehb{font-size:11px;padding:2px 8px;border-radius:5px;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;}
.cb{display:none;padding:0 14px 14px 46px;border-top:1px solid var(--border);}
.cb.op{display:block;padding-top:12px;}
.bl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.bt{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:11px;}
.ck-list{display:flex;flex-direction:column;gap:4px;margin-bottom:11px;}
.ck-it{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--muted);line-height:1.5;}
.ckb{width:14px;height:14px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;margin-top:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:all .12s;}
.ckb.on{background:var(--green);border-color:var(--green);color:#fff;}
.task-list{display:flex;flex-direction:column;gap:3px;margin-bottom:6px;}
.task-it{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg);border-radius:7px;border:0.5px solid var(--border);}
.tcb{width:14px;height:14px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:all .12s;}
.tcb.on{background:var(--green);border-color:var(--green);color:#fff;}
.ttxt{flex:1;font-size:12px;color:var(--text);}
.ttxt.done{text-decoration:line-through;color:var(--subtle);}
.towner{font-size:10px;color:var(--muted);background:var(--surface);padding:1px 6px;border-radius:10px;border:0.5px solid var(--border);}
.dico{font-size:11px;color:var(--subtle);cursor:pointer;padding:1px 5px;border-radius:4px;}
.dico:hover{color:var(--red);}
.add-row{display:flex;gap:6px;margin-top:4px;}
.add-row input,.add-row textarea{flex:1;padding:6px 10px;border-radius:7px;border:1px solid var(--border);font-size:12px;outline:none;color:var(--text);background:var(--surface);font-family:inherit;}
.add-row input:focus,.add-row textarea:focus{border-color:var(--navy);}
.add-row select{padding:6px 8px;border-radius:7px;border:1px solid var(--border);font-size:11px;outline:none;background:var(--surface);color:var(--text);}
.add-row button{padding:6px 12px;border-radius:7px;background:var(--navy);color:var(--gold);border:none;font-size:11px;font-weight:600;cursor:pointer;}
.note-list{display:flex;flex-direction:column;gap:4px;margin-bottom:6px;}
.note-it{padding:7px 10px;background:#FFFBF0;border-radius:7px;border:0.5px solid #FCD34D;font-size:12px;display:flex;gap:7px;}
.note-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.del-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.del-tag{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500;}
.card-acts{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.ca{font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .12s;}
.ca:hover{background:var(--bg);}
.ca.red{color:var(--red);border-color:#FECACA;}
.ca.red:hover{background:#FFF5F5;}
.hw{position:relative;display:inline-flex;}
.hic{width:13px;height:13px;border-radius:50%;background:var(--bg);border:0.5px solid var(--border);color:var(--muted);font-size:8px;font-style:italic;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.hic:hover{background:var(--navy);color:var(--gold);border-color:var(--navy);}
.htip{display:none;position:absolute;left:18px;top:50%;transform:translateY(-50%);background:var(--navy);color:#fff;font-size:11px;line-height:1.55;padding:8px 12px;border-radius:7px;width:200px;z-index:100;}
.htip::before{content:'';position:absolute;left:-4px;top:50%;transform:translateY(-50%);border:4px solid transparent;border-right-color:var(--navy);border-left:none;}
.hw:hover .htip{display:block;}
.empty{text-align:center;padding:20px;color:var(--muted);font-size:13px;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;}
.modal-ov.show{display:flex;}
.modal{background:var(--surface);border-radius:14px;padding:22px;width:100%;max-width:460px;margin:16px;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px;}
.field{margin-bottom:10px;}
.field label{font-size:12px;font-weight:500;color:var(--muted);display:block;margin-bottom:3px;}
.field input,.field textarea,.field select{width:100%;padding:8px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;outline:none;color:var(--text);font-family:inherit;transition:border-color .15s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--navy);}
.field textarea{resize:vertical;min-height:65px;}
.modal-acts{display:flex;gap:8px;margin-top:14px;}
.mb{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;}
.ms{background:var(--navy);color:var(--gold);}
.mc{background:var(--bg);color:var(--text);border:1px solid var(--border);}
@media(max-width:680px){.layout{grid-template-columns:1fr;}.sidebar{position:relative;height:auto;}.stats{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">ARIA · 新智汇 <span id="bsub">SOP Workspace · Pilot M1–M2</span></div>
  <div class="top-r">
    <div class="ts">Total <b id="tsd">0</b>/<b id="tst">0</b> &nbsp; Overall <b id="tsp">0</b>%</div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">中文</button>
    <div class="role-pill"><div class="rp-dot"></div><div class="rp-name" id="rpName">PM</div></div>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sb"></div>
  <div class="main" id="mn"></div>
</div>

<div class="modal-ov" id="sm">
  <div class="modal">
    <div class="modal-title" id="smt">Add SOP Step</div>
    <div class="field"><label id="lt">Step title *</label><input id="mT" placeholder="e.g. Define project charter"/></div>
    <div class="field"><label id="ls">Section</label><select id="mS"></select></div>
    <div class="field"><label id="lw">Responsible parties</label><input id="mW" placeholder="e.g. PM + BA"/></div>
    <div class="field"><label id="ld">Description</label><textarea id="mD" placeholder="What does this step involve?"></textarea></div>
    <div class="field"><label id="lc">Checklist (one per line)</label><textarea id="mC" style="min-height:65px;" placeholder="Step 1&#10;Step 2"></textarea></div>
    <div class="field"><label id="ldl">Deliverables (comma separated)</label><input id="mDl" placeholder="e.g. Charter v1.0, Risk Register"/></div>
    <div class="modal-acts">
      <button class="mb mc" onclick="cSM()">Cancel</button>
      <button class="mb ms" onclick="saveSM()">Save Step</button>
    </div>
  </div>
</div>

<div class="modal-ov" id="secm">
  <div class="modal">
    <div class="modal-title" id="secmt">Add New Section</div>
    <div class="field"><label id="lsn">Section name *</label><input id="secn" placeholder="e.g. Risk Management"/></div>
    <div class="modal-acts">
      <button class="mb mc" onclick="document.getElementById('secm').classList.remove('show')">Cancel</button>
      <button class="mb ms" onclick="saveSec()">Add Section</button>
    </div>
  </div>
</div>

  {id:'ba2',sec:'Discovery',t:'As-is process mapping and gap analysis',w:'BA + End Users + Functional TA',s:'todo',desc:'Document current delivery processes for all 7 roles. Identify gaps ARIA will resolve.',cl:['Map current-state processes for all 7 roles','Quantify pain: time, error rates, rework frequency','Identify ARIA agent automation candidates','Document to-be processes showing improvements','Validate gap analysis with each role owner'],del:['As-Is Process Maps','Gap Analysis Report','To-Be Process Maps'],tasks:[],notes:[]},
  {id:'ba3',sec:'Requirements',t:'Business requirements document (BRD)',w:'BA + PM',s:'todo',desc:'Consolidate all requirements into a formal BRD — what the system must do, not how.',cl:['Organise by banking capability and functional area','Apply SMART criteria to every requirement','Classify: Must Have vs Should/Could Have','Assign unique IDs: REQ-ACC-001, REQ-LOAN-001','5-day review window — obtain formal sign-off'],del:['Business Requirements Document','Requirements Priority Matrix'],tasks:[],notes:[]},
  {id:'ba4',sec:'Requirements',t:'Requirements traceability matrix (RTM)',w:'BA',s:'todo',desc:'Link every requirement to its FSD section, user story, test case, and deployment status.',cl:['RTM columns: Req ID, FSD Ref, User Story, Test Case, Status','Every requirement has a row before FSD starts','Link FSD sections to parent requirements','Update RTM weekly','Submit as BOI evidence'],del:['Requirements Traceability Matrix'],tasks:[],notes:[]},
  {id:'ba5',sec:'User Stories',t:'User story writing and backlog grooming',w:'BA + PM + Dev',s:'todo',desc:'Translate requirements into well-structured, independently deliverable user stories.',cl:['Format: "As a [role], I want [capability] so that [benefit]"','3–5 acceptance criteria per story','Apply INVEST criteria','Biweekly grooming with PM and Dev team','MoSCoW prioritisation per phase'],del:['Product Backlog','User Story Library'],tasks:[],notes:[]},
  {id:'ba6',sec:'User Stories',t:'Acceptance criteria and UAT coordination',w:'BA + Tester + Client',s:'todo',desc:'Define precise acceptance criteria and coordinate UAT with business users.',cl:['Write criteria in Given/When/Then format','Each criterion independently verifiable','Review with Tester for testability','Review with client to confirm business intent','UAT window: minimum 2 weeks, business users only'],del:['Acceptance Criteria Library','UAT Sign-off Record'],tasks:[],notes:[]},
  {id:'ba7',sec:'Change Control',t:'Requirement change assessment',w:'BA + PM',s:'todo',desc:'Formal impact assessment before any requirement change proceeds. No changes without written approval.',cl:['All changes via ARIA change request form — no verbal changes','Assess impact on BRD, user stories, RTM','Coordinate with TAs for full impact','Document response within 3 business days','Update BRD and RTM only after written client approval'],del:['Change Impact Assessment','Updated BRD'],tasks:[],notes:[]}

ita:[
  {id:'ita1',sec:'Architecture',t:'Platform component diagram and integration blueprint',w:'Integration TA + PM + Functional TA',s:'todo',desc:'Master integration architecture — all AWS services, OceanBase, AgentCore, and external tools in one blueprint.',cl:['Define platform layers: Presentation/Orchestration/Integration/Data/Infrastructure','Map all AWS services: EKS, AgentCore, API Gateway, S3, EventBridge, CloudWatch','Document all external integrations: Jira, GitHub, Slack, core banking systems','Design agent-to-agent communication patterns','Publish diagram v1.0 — 5-day review before baseline'],del:['Component Diagram v1.0','Data Flow Diagram','Integration Map'],tasks:[],notes:[]},
  {id:'ita2',sec:'Architecture',t:'Tech stack decision record (TDR) register',w:'Integration TA',s:'todo',desc:'Every major technology choice documented with rationale, alternatives, and trade-offs.',cl:['TDR template: Decision/Context/Options/Rationale/Consequences','Write TDR for AWS, OceanBase, AgentCore, EKS vs ECS, LLM model','Assign unique IDs linked to architecture diagram','Store all TDRs in ARIA knowledge base','Review with Dev team before implementation begins'],del:['TDR Register','Architecture Decision Log'],tasks:[],notes:[]},
  {id:'ita3',sec:'API & Data',t:'API design standards and OpenAPI 3.0 specification',w:'Integration TA + Dev Lead',s:'todo',desc:'API layer connecting all agents, OceanBase, AWS services, and external tools.',cl:['RESTful with OpenAPI 3.0 — mandatory for all endpoints','API Gateway routing: one group per agent (/pm/ /ba/ /ita/ /fta/ /dev/ /qa/ /ma/)','JWT via AWS Cognito — mandatory on every endpoint','Rate limiting per agent endpoint','Publish OpenAPI spec before Dev writes any code'],del:['OpenAPI 3.0 Spec','API Gateway Config','Auth Design Doc'],tasks:[],notes:[]},
  {id:'ita4',sec:'API & Data',t:'OceanBase schema design and CDC pipeline',w:'Integration TA + Dev Lead',s:'todo',desc:'OceanBase schema for relational data, documents, and vector embeddings. CDC keeps Knowledge Bases in sync.',cl:['Core schema: projects, tasks, agents, audit_log, users, sop_library, banking_rules','Vector store: embedding_store (agent_id, project_id, content, embedding, metadata)','Multi-tenant: one OceanBase tenant per client project','CDC pipeline: OceanBase binlog → Kafka (MSK) → AWS Glue → Bedrock KB','Multi-replica with RPO=0 across 2+ Availability Zones'],del:['OceanBase Schema v1.0','CDC Pipeline Design','DR Configuration'],tasks:[],notes:[]},
  {id:'ita5',sec:'AgentCore',t:'Bedrock AgentCore runtime and gateway configuration',w:'Integration TA + Dev Lead',s:'todo',desc:'Technical backbone for all 7 ARIA agents. Integration TA owns infrastructure; Functional TA owns agent logic.',cl:['AgentCore Runtime: container specs, memory limits, timeout policies per agent','AgentCore Gateway: MCP tools for Jira, GitHub, Slack, OceanBase, core banking APIs','AgentCore Identity: OAuth2 scopes per agent role','AgentCore Memory: S3 episodic + OceanBase long-term vector memory','Step-level CloudWatch trace logging for every agent invocation'],del:['AgentCore Config Spec','Tool Definition Library','Supervisor Routing Design'],tasks:[],notes:[]},
  {id:'ita6',sec:'Security & IaC',t:'Security architecture, PDPA framework and IaC setup',w:'Integration TA + BA',s:'todo',desc:'End-to-end security and all infrastructure as code. Thai PDPA mandatory for BOI.',cl:['STRIDE threat modelling with Functional TA and Dev Lead','VPC, private subnets, NACLs, Security Groups, WAF on API Gateway','AES-256 at rest (KMS), TLS 1.3 in transit — zero exceptions','AWS Secrets Manager — zero hardcoded secrets anywhere in code','PDPA: Thai client data stays in AWS Thailand Region','AWS CDK (TypeScript) for all infrastructure','Checkov security scan on every CDK PR — block merge on critical findings'],del:['Security Architecture Doc','PDPA Framework','CDK Codebase v1.0'],tasks:[],notes:[]},
  {id:'ita7',sec:'Performance & DR',t:'NFR definition, load testing and disaster recovery',w:'Integration TA + PM + Functional TA',s:'todo',desc:'Measurable NFRs, load testing, and DR plan forming part of client SLA and BOI evidence.',cl:['NFRs: API p95<2s, agent p95<5s, availability 99.9%, RTO<1hr, RPO<15min','Load test plan: baseline, stress, spike, endurance using k6 or Gatling','Multi-AZ: EKS and OceanBase across minimum 2 Availability Zones','AWS Backup cross-region replication to Singapore (ap-southeast-1)','CloudWatch Synthetics 24/7 monitoring with PagerDuty alerting'],del:['NFR Specification','Load Test Report','DR Runbook'],tasks:[],notes:[]}

  {id:'fta1',sec:'Functional Specs',t:'Functional specification document (FSD) creation',w:'Functional TA + BA + Bank Product Owner',s:'todo',desc:'Translate BA requirements into detailed FSD — field by field, rule by rule. Primary technical delivery document.',cl:['Never start without a formally signed-off BRD from BA','Break each requirement into: screens, workflows, validations, calculations','Specify every field: name, type, length, mandatory/optional, validation rule','Document business rules as explicit logic: IF [condition] THEN [action]','5-day review and approval cycle with BA, Dev Lead, and Bank Product Owner'],del:['Functional Specification Document','Business Rules Catalogue','Screen Wireframes'],tasks:[],notes:[]},
  {id:'fta2',sec:'Functional Specs',t:'Financial business rules documentation and validation',w:'Functional TA + Bank Product Owner + Compliance',s:'todo',desc:'Document all financial rules governing banking products. A single error causes direct financial loss.',cl:['Interest calculation rules: accrual method, compounding, day count convention (ACT/365, ACT/360)','Fee rules: transaction fees, service charges, penalties, waiver conditions per segment','Rounding rules: every calculation must specify method and decimal precision','Cut-off times: intraday, EOD, and month-end rules per transaction type','Compliance sign-off mandatory — written approval required for all rules'],del:['Financial Business Rules Catalogue','Calculation Specification','Rule Test Matrix'],tasks:[],notes:[]},
  {id:'fta3',sec:'Core Banking',t:'Core banking module functional design',w:'Functional TA + Integration TA + Dev Lead',s:'todo',desc:'Functional design of core banking modules — accounts, deposits, loans, and GL.',cl:['Account module: account types, opening workflow, dormancy rules, closure process','Deposit module: term deposit, savings, current account parameter configurations','Loan module: origination, disbursement, repayment schedule, prepayment, restructuring','GL mapping: every transaction type must have a fully defined GL entry (Dr/Cr, cost centre)','EOD and EOM batch processing flows for each module'],del:['Module Functional Design','GL Mapping Table','EOD/EOM Process Flow','Parameter Configuration Table'],tasks:[],notes:[]},
  {id:'fta4',sec:'Regulatory',t:'Regulatory compliance requirement mapping',w:'Functional TA + Compliance + Legal',s:'todo',desc:'Map all Thai and international banking regulations to system functional requirements.',cl:['Identify all regulations: BOT, PDPA, AML/CFT, FATCA, CRS, IFRS 9, NCB reporting','Regulation-to-Function matrix: every regulation mapped to the system function it affects','KYC/CDD requirements: customer verification workflow, document capture, screening','AML monitoring rules: threshold amounts, suspicious patterns, STR filing workflow','Compliance and Legal sign-off on all mappings before FSD is finalised'],del:['Regulation-to-Function Matrix','KYC/CDD Spec','AML Monitoring Rules','Regulatory Reporting Spec'],tasks:[],notes:[]},
  {id:'fta5',sec:'Interface & Data',t:'System interface specification design',w:'Functional TA + Integration TA + Dev',s:'todo',desc:'Functional specifications for all interfaces between banking systems.',cl:['Identify all interfaces: CBS ↔ digital channels, CBS ↔ GL, CBS ↔ risk system','For each interface: trigger event, message format (ISO 20022/proprietary), frequency','Error response codes and business-level error handling per interface','Synchronous vs asynchronous patterns based on business timing requirements','Reconciliation mechanism per interface: how both sides confirm successful exchange'],del:['Interface Specification Register','Message Format Catalogue','Interface Test Case Library'],tasks:[],notes:[]},
  {id:'fta6',sec:'Interface & Data',t:'Data mapping and migration specification',w:'Functional TA + BA + Dev Lead',s:'todo',desc:'Field-level data mapping for core banking migration. A single unmapped field can cause regulatory breach.',cl:['Complete source-to-target mapping: every field with transformation rule','Data cleansing rules: nulls, invalid values, duplicates, legacy product codes','Migration sequence: customers → accounts → loans → transactions → collateral → history','Balance reconciliation: migrated balances must match source to the cent','Finance and Compliance sign-off before production cutover is approved'],del:['Data Mapping Specification','Data Cleansing Rules','Migration Sequence Plan','Balance Reconciliation Spec'],tasks:[],notes:[]},

  {id:'dev3',sec:'Build & Test',t:'CI/CD pipeline setup and automated testing',w:'Dev Lead + Integration TA',s:'todo',desc:'Automated CI/CD pipeline that tests, validates, and deploys every code change.',cl:['GitHub Actions for CI on every PR to develop and main','CI stages: lint → unit tests → integration tests → security scan → build','AWS CodePipeline for CD with staging and production deployment gates','Minimum 80% unit test coverage for all new code','Auto-rollback if prod error rate exceeds 1% within 10 minutes of deploy'],del:['CI/CD Pipeline Config','GitHub Actions Workflows','Deployment Gates Policy'],tasks:[],notes:[]},

  {id:'qa4',sec:'Test Execution',t:'Regression test suite and automation',w:'Tester + Dev Lead',s:'todo',desc:'Automated regression suite confirming new code has not broken existing banking functionality.',cl:['Regression scope: all Critical/High rules, all GL posting, all regulatory feeds','Build automated suite using Playwright or Pytest','Integrate into CD pipeline: runs automatically on every staging deployment','Suite completes within 30 minutes — parallelise execution to meet this target','Pass threshold: 100% Critical, ≥98% all tests before production release'],del:['Automated Regression Suite','Regression Run Reports','Suite Maintenance Log'],tasks:[],notes:[]},

let CUR=null,UNAME='',SELID=null;
const OPEN=new Set();
let M_ROLE=null,M_EDIT=null;

function gs(rid){const k='aria_sop_'+rid;try{const d=localStorage.getItem(k);if(d)return JSON.parse(d);}catch(e){}return JSON.parse(JSON.stringify(DS[rid]||[]));}
function ss(rid,sops){try{localStorage.setItem('aria_sop_'+rid,JSON.stringify(sops));}catch(e){}}
function glog(){try{return JSON.parse(localStorage.getItem('aria_log')||'[]');}catch(e){return[];}}
function alog(msg){const l=glog();l.unshift({msg,who:UNAME,t:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});if(l.length>25)l.length=25;try{localStorage.setItem('aria_log',JSON.stringify(l));}catch(e){}}
function pct(rid){const s=gs(rid);const d=s.filter(x=>x.s==='done').length;return{d,t:s.length,p:s.length?Math.round(d/s.length*100):0};}
function gstat(){const d=ROLES.reduce((a,r)=>a+gs(r.id).filter(s=>s.s==='done').length,0);const t=ROLES.reduce((a,r)=>a+gs(r.id).length,0);return{d,t,p:t?Math.round(d/t*100):0};}
function ckGet(rid,sid,ci){try{return JSON.parse(localStorage.getItem('aria_ck_'+rid+'_'+sid)||'{}')[ci];}catch(e){return false;}}
function ckSet(rid,sid,ci,v){const k='aria_ck_'+rid+'_'+sid;let o={};try{o=JSON.parse(localStorage.getItem(k)||'{}');}catch(e){}o[ci]=v;localStorage.setItem(k,JSON.stringify(o));}

let LANG = localStorage.getItem('aria_lang') || 'en';
let CUR_ROLE = 'PM';
let CUR_AID = 'pm';
let MR = null, ME = null;
const OP = new Set();

function T(k, v) {
  let s = (I18N[LANG] || I18N.en)[k] || k;
  if (v) Object.keys(v).forEach(x => { s = s.replace('{' + x + '}', v[x]); });
  return s;
}
function gs(r) { try { const d = localStorage.getItem('aria_sop_' + r); if (d) return JSON.parse(d); } catch (e) {} return JSON.parse(JSON.stringify(DS[r] || [])); }
function ss2(r, s) { try { localStorage.setItem('aria_sop_' + r, JSON.stringify(s)); } catch (e) {} }
function glog() { try { return JSON.parse(localStorage.getItem('aria_log') || '[]'); } catch (e) { return []; } }
function alog(m) { const l = glog(); l.unshift({ m, w: CUR_ROLE, t: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) }); if (l.length > 20) l.length = 20; try { localStorage.setItem('aria_log', JSON.stringify(l)); } catch (e) {} }
function pct(r) { const s = gs(r); const d = s.filter(x => x.s === 'done').length; return { d, t: s.length, p: s.length ? Math.round(d / s.length * 100) : 0 }; }
function gst() { const d = ROLES.reduce((a, r) => a + gs(r.id).filter(s => s.s === 'done').length, 0); const t = ROLES.reduce((a, r) => a + gs(r.id).length, 0); return { d, t, p: t ? Math.round(d / t * 100) : 0 }; }
function ckg(r, s, c) { try { return JSON.parse(localStorage.getItem('aria_ck_' + r + '_' + s) || '{}')[c]; } catch (e) { return false; } }
function cks(r, s, c, v) { const k = 'aria_ck_' + r + '_' + s; let o = {}; try { o = JSON.parse(localStorage.getItem(k) || '{}'); } catch (e) {} o[c] = v; localStorage.setItem(k, JSON.stringify(o)); }

function updTS() { const g = gst(); document.getElementById('tsd').textContent = g.d; document.getElementById('tst').textContent = g.t; document.getElementById('tsp').textContent = g.p + '%'; }

function toggleLang() { LANG = LANG === 'en' ? 'zh' : 'en'; localStorage.setItem('aria_lang', LANG); apLS(); rAll(CUR_AID); }

function apLS() {
  document.getElementById('langBtn').textContent = T('langBtn') || (LANG === 'en' ? '中文' : 'EN');
  document.getElementById('bsub').textContent = LANG === 'en' ? 'SOP Workspace · Pilot M1–M2' : 'SOP 协作工作区 · 试点 M1–M2';
  document.getElementById('lt').textContent = LANG === 'en' ? 'Step title *' : '步骤标题 *';
  document.getElementById('ls').textContent = LANG === 'en' ? 'Section' : '所属板块';
  document.getElementById('lw').textContent = LANG === 'en' ? 'Responsible parties' : '负责方';
  document.getElementById('ld').textContent = LANG === 'en' ? 'Description' : '描述';
  document.getElementById('lc').textContent = LANG === 'en' ? 'Checklist (one per line)' : '清单项（每行一条）';
  document.getElementById('ldl').textContent = LANG === 'en' ? 'Deliverables (comma separated)' : '关键交付物（逗号分隔）';
  document.getElementById('secmt').textContent = LANG === 'en' ? 'Add New Section' : '新增板块';
  document.getElementById('lsn').textContent = LANG === 'en' ? 'Section name *' : '板块名称 *';
}

function rAll(aid) {
  CUR_AID = aid;
  CUR_ROLE = ROLES.find(x => x.id === aid)?.name || 'User';
  document.getElementById('rpName').textContent = CUR_ROLE;
  rSB(aid);
  rMN(aid);
  updTS();
}

function rSB(aid) {
  const g = gst();
  const wip = ROLES.reduce((a, r) => a + gs(r.id).filter(s => s.s === 'wip').length, 0);
  const todo = ROLES.reduce((a, r) => a + gs(r.id).filter(s => s.s === 'todo').length, 0);
  document.getElementById('sb').innerHTML = `<div class="sb-head">${LANG === 'en' ? 'Delivery Roles' : '交付角色'}</div>` +
    ROLES.map(r => {
      const { d, t, p } = pct(r.id);
      return `<div class="rb ${aid === r.id ? 'active' : ''}" onclick="rAll('${r.id}')" style="${aid === r.id ? 'border-left-color:' + r.color + ';' : ''}">
        <div class="rb-ic" style="background:${r.light};color:${r.color};font-size:11px;font-weight:700;">${r.icon}</div>
        <div class="rb-inf">
          <div class="rb-nm" style="${aid === r.id ? 'color:' + r.color + ';' : ''}">${r.name}</div>
          <div class="rb-pc">${d}/${t} · ${p}%</div>
          <div class="rb-bar"><div class="rb-fill" style="width:${p}%;background:${r.color};"></div></div>
        </div>
      </div>`;
    }).join('') +
    `<div class="sb-div"></div>
    <div class="sb-sum">
      <div style="font-size:10px;font-weight:700;color:var(--subtle);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;">${LANG === 'en' ? 'Overall' : '整体'}</div>
      <div class="sg">
        <div class="sc"><div class="sc-n" style="color:var(--navy);">${g.t}</div><div class="sc-l">${LANG === 'en' ? 'Steps' : '步骤'}</div></div>
        <div class="sc"><div class="sc-n" style="color:var(--green);">${g.d}</div><div class="sc-l">${LANG === 'en' ? 'Done' : '完成'}</div></div>
        <div class="sc"><div class="sc-n" style="color:var(--amber);">${wip}</div><div class="sc-l">${LANG === 'en' ? 'WIP' : '进行中'}</div></div>
        <div class="sc"><div class="sc-n" style="color:var(--subtle);">${todo}</div><div class="sc-l">${LANG === 'en' ? 'To do' : '待处理'}</div></div>
      </div>
    </div>`;
}

function hlp(tip) { return `<span class="hw"><span class="hic">i</span><span class="htip">${tip}</span></span>`; }

function rMN(aid) {
  const r = ROLES.find(x => x.id === aid);
  const sops = gs(aid);
  const { d, t, p } = pct(aid);
  const wip = sops.filter(s => s.s === 'wip').length;
  const todo = sops.filter(s => s.s === 'todo').length;
  const secs = [...new Set(sops.map(s => s.sec))];
  const log = glog().slice(0, 5);
  const av = localStorage.getItem('aria_act') !== '0';
  const EN = LANG === 'en';

  const rh = `<div class="rh" style="border-left:4px solid ${r.color};">
    <div class="rh-av" style="background:${r.light};">${r.icon}</div>
    <div style="flex:1;">
      <div class="rh-nm" style="color:${r.color};">${r.full}</div>
      <div class="rh-sub">${r.sub}</div>
      <div class="stk">${r.stack.map(s => `<span class="stk-t" style="background:${s.b};color:${s.f};">${s.l}</span>`).join('')}</div>
    </div>
  </div>`;

  const tb = `<div class="tb">
    <button class="tbtn pr" onclick="oAdd('${aid}')">${EN ? '+ Add SOP Step' : '+ 新增 SOP 步骤'}</button>
    ${hlp(EN ? 'Add a new SOP step — title, section, checklist, and deliverables.' : '新增一个 SOP 步骤，填写标题、板块、清单和交付物。')}
    <button class="tbtn" onclick="oSec('${aid}')">${EN ? '+ Add Section' : '+ 新增板块'}</button>
    ${hlp(EN ? 'Add a new section to organise SOP steps.' : '新增一个板块，用于分类组织 SOP 步骤。')}
  </div>`;

  const stats = `<div class="stats">
    <div class="stat"><div class="stat-n" style="color:${r.color};">${t}</div><div class="stat-l">${EN ? 'SOP steps' : 'SOP 步骤'}</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green);">${d}</div><div class="stat-l">${EN ? 'Completed' : '已完成'}</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--amber);">${wip}</div><div class="stat-l">${EN ? 'In progress' : '进行中'}</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--subtle);">${todo}</div><div class="stat-l">${EN ? 'To do' : '待处理'}</div></div>
  </div>`;

  const pb = `<div class="pb">
    <div class="pb-m"><span style="color:${r.color};">${r.full} — ${EN ? 'completion' : '完成度'}</span><span>${d}/${t} · ${p}%</span></div>
    <div class="pb-t"><div class="pb-f" style="width:${p}%;background:${r.color};"></div></div>
  </div>`;

  const act = log.length ? `<div class="act-box">
    <div class="act-hd">
      <div class="act-ttl">${EN ? 'Recent activity' : '最近操作'} ${hlp(EN ? 'Log of all actions taken in this workspace. Can be hidden or cleared.' : '团队成员的所有操作日志，可隐藏或清空。')}</div>
      <div class="act-btns">
        <button class="asmb r" onclick="clrLog('${aid}')">${EN ? 'Clear' : '清空'}</button>
        <button class="asmb" onclick="togAct('${aid}')">${av ? (EN ? 'Hide' : '隐藏') : (EN ? 'Show' : '显示')}</button>
      </div>
    </div>
    ${av ? `<div class="act-list">${log.map(a => `<div class="act-it"><div class="act-dot"></div><span><b style="color:var(--text);font-weight:600;">${a.w}</b> — ${a.m}</span><span class="act-tm">${a.t}</span></div>`).join('')}</div>` : ''}
  </div>` : '';

  const pain = `<div class="pain-row"><span class="pl">${EN ? 'Pain points:' : '痛点：'}</span>${r.pain.map(p => `<span class="pt">${p}</span>`).join('')}</div>`;
  const stabs = secs.length ? `<div class="stabs">${secs.map(s => `<span class="stab" style="background:${r.color};">${s}</span>`).join('')}</div>` : '';

  const cards = sops.length ? sops.map((sop, i) => {
    const op = OP.has(aid + '_' + i);
    const bc = sop.s === 'done' ? 'b-done' : sop.s === 'wip' ? 'b-wip' : 'b-todo';
    const bl = sop.s === 'done' ? (EN ? 'Done' : '已完成') : sop.s === 'wip' ? (EN ? 'In progress' : '进行中') : (EN ? 'To do' : '待处理');
    const ckD = (sop.cl || []).filter((_, ci) => ckg(aid, sop.id, ci)).length;
    const tasks = sop.tasks || [];
    const notes = sop.notes || [];

    const ckH = (sop.cl && sop.cl.length) ? `
      <div class="bl">${EN ? 'Checklist' : '操作清单'} ${hlp(EN ? 'Standard steps for this SOP. Tick each as you complete it.' : '标准操作规范，逐项勾选代表完成。')}</div>
      <div class="ck-list">${sop.cl.map((c, ci) => {
        const ck = ckg(aid, sop.id, ci);
        return `<div class="ck-it"><div class="ckb ${ck ? 'on' : ''}" onclick="tCk('${aid}','${sop.id}',${ci})">${ck ? '✓' : ''}</div><span style="${ck ? 'text-decoration:line-through;opacity:.5;' : ''}">${c}</span></div>`;
      }).join('')}</div>` : '';

    const delH = (sop.del && sop.del.length) ? `
      <div class="bl">${EN ? 'Deliverables' : '交付物'} ${hlp(EN ? 'Key documents this step should produce — for client sign-off and BOI evidence.' : '此步骤应产出的关键文件，用于 BOI 合规证明。')}</div>
      <div class="del-tags">${sop.del.map(d => `<span class="del-tag" style="background:${r.light};color:${r.color};">${d}</span>`).join('')}</div>` : '';

    const tH = `<div style="margin-bottom:10px;">
      <div class="bl">${EN ? 'Tasks' : '任务'} (${tasks.filter(t => t.done).length}/${tasks.length}) ${hlp(EN ? 'Project-specific action items. Add tasks with an assignee to track who is doing what.' : '当前项目的具体待办，可指定负责人。')}</div>
      ${tasks.length ? `<div class="task-list">${tasks.map((t, ti) => `
        <div class="task-it">
          <div class="tcb ${t.done ? 'on' : ''}" onclick="tTask('${aid}','${sop.id}',${ti})">${t.done ? '✓' : ''}</div>
          <div class="ttxt ${t.done ? 'done' : ''}">${t.text}</div>
          ${t.owner ? `<span class="towner">${t.owner}</span>` : ''}
          <span class="dico" onclick="dTask('${aid}','${sop.id}',${ti})">✕</span>
        </div>`).join('')}</div>` : `<div style="font-size:11px;color:var(--subtle);margin-bottom:5px;">${EN ? 'No tasks yet.' : '暂无任务。'}</div>`}
      <div class="add-row">
        <input id="ti_${sop.id}" placeholder="${EN ? 'Add task...' : '添加任务...'}" />
        <select id="to_${sop.id}"><option value="">${EN ? 'Assign...' : '指派给...'}</option>${(r.members || []).map(m => `<option value="${m}">${m}</option>`).join('')}</select>
        <button id="abtn_${sop.id}">${EN ? 'Add' : '添加'}</button>
      </div>
    </div>`;

    const nH = `<div style="margin-bottom:10px;">
      <div class="bl">${EN ? 'Notes' : '备注'} (${notes.length}) ${hlp(EN ? 'Discussion records and decision logs for BOI audit trail.' : '讨论记录和决策备注，BOI 审计证据链。')}</div>
      ${notes.length ? `<div class="note-list">${notes.map((n, ni) => `
        <div class="note-it">
          <div style="flex:1;"><div>${n.text}</div><div class="note-meta">${n.w} · ${n.t}</div></div>
          <span class="dico" onclick="dNote('${aid}','${sop.id}',${ni})">✕</span>
        </div>`).join('')}</div>` : `<div style="font-size:11px;color:var(--subtle);margin-bottom:5px;">${EN ? 'No notes yet.' : '暂无备注。'}</div>`}
      <div class="add-row">
        <textarea id="ni_${sop.id}" placeholder="${EN ? 'Add a note or comment...' : '添加备注或评论...'}"></textarea>
        <button id="nbtn_${sop.id}">${EN ? 'Add' : '添加'}</button>
      </div>
    </div>`;

    const acts = `<div class="card-acts">
      <button class="ca" style="${sop.s === 'done' ? 'background:' + r.color + ';color:#fff;border-color:' + r.color + ';' : ''}" onclick="setSt('${aid}','${sop.id}','done')">✓ ${EN ? 'Done' : '已完成'}</button>
      <button class="ca" style="${sop.s === 'wip' ? 'background:var(--amber);color:#fff;border-color:var(--amber);' : ''}" onclick="setSt('${aid}','${sop.id}','wip')">${EN ? 'In progress' : '进行中'}</button>
      <button class="ca" onclick="setSt('${aid}','${sop.id}','todo')">${EN ? 'Reset' : '重置'}</button>
      <button class="ca" onclick="oEdit('${aid}',${i})" style="margin-left:auto;">✏ ${EN ? 'Edit' : '编辑'}</button>
      <button class="ca red" onclick="dSop('${aid}','${sop.id}')">🗑 ${EN ? 'Delete' : '删除'}</button>
    </div>`;

    const ehb = `<button class="ehb" onclick="event.stopPropagation();oEdit('${aid}',${i})">✏</button>`;

    return `<div class="card">
      <div class="ch" onclick="tCard('${aid}',${i})">
        <div class="sn" style="background:${r.color};">${i + 1}</div>
        <div class="si">
          <div class="st2">${sop.t}</div>
          <div class="sw">${sop.w || ''} · ${sop.sec} · ${ckD}/${(sop.cl || []).length} ck · ${tasks.filter(t => t.done).length}/${tasks.length} tasks</div>
        </div>
        <div class="sr">${ehb}<span class="badge ${bc}">${bl}</span><span class="chev ${op ? 'op' : ''}">▶</span></div>
      </div>
      <div class="cb ${op ? 'op' : ''}">
        <div class="bl">Overview</div>
        <div class="bt">${sop.desc || ''}</div>
        ${ckH}${delH}${tH}${nH}${acts}
      </div>
    </div>`;
  }).join('') : `<div class="empty">${EN ? 'No SOP steps yet. Click "+ Add SOP Step" to get started.' : '暂无 SOP 步骤。点击"+ 新增 SOP 步骤"开始创建。'}</div>`;

  document.getElementById('mn').innerHTML = rh + tb + stats + pb + act + pain + stabs + `<div class="cards">${cards}</div>`;
}

function tCard(r, i) { const k = r + '_' + i; OP.has(k) ? OP.delete(k) : OP.add(k); rMN(r); }
function tCk(r, s, c) { cks(r, s, c, !ckg(r, s, c)); alog('Updated checklist'); rAll(r); }
function setSt(r, s, st) { const d = gs(r); const sop = d.find(x => x.id === s); if (sop) { sop.s = st; ss2(r, d); alog('Marked "' + sop.t.substring(0, 22) + '..." as ' + st); } rAll(r); }
function tTask(r, s, ti) { const d = gs(r); const sop = d.find(x => x.id === s); if (sop && sop.tasks[ti]) { sop.tasks[ti].done = !sop.tasks[ti].done; ss2(r, d); alog('Updated task'); } rAll(r); }
function aTask(r, s) { const inp = document.getElementById('ti_' + s); const own = document.getElementById('to_' + s); if (!inp || !inp.value.trim()) return; const d = gs(r); const sop = d.find(x => x.id === s); if (sop) { if (!sop.tasks) sop.tasks = []; sop.tasks.push({ text: inp.value.trim(), owner: own ? own.value : '', done: false, w: CUR_ROLE, t: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) }); ss2(r, d); alog('Added task: "' + inp.value.trim() + '"'); inp.value = ''; } rAll(r); }
function dTask(r, s, ti) { const d = gs(r); const sop = d.find(x => x.id === s); if (sop && confirm(LANG === 'en' ? 'Delete this task?' : '确认删除此任务？')) { sop.tasks.splice(ti, 1); ss2(r, d); alog('Deleted a task'); } rAll(r); }
function aNote(r, s) { const ta = document.getElementById('ni_' + s); if (!ta || !ta.value.trim()) return; const d = gs(r); const sop = d.find(x => x.id === s); if (sop) { if (!sop.notes) sop.notes = []; sop.notes.push({ text: ta.value.trim(), w: CUR_ROLE, t: new Date().toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) }); ss2(r, d); alog('Added note'); ta.value = ''; } rAll(r); }
function dNote(r, s, ni) { const d = gs(r); const sop = d.find(x => x.id === s); if (sop && confirm(LANG === 'en' ? 'Delete this note?' : '确认删除此备注？')) { sop.notes.splice(ni, 1); ss2(r, d); alog('Deleted a note'); } rAll(r); }
function dSop(r, s) { if (!confirm(LANG === 'en' ? 'Delete this SOP step? Cannot be undone.' : '确认删除此 SOP 步骤？删除后无法恢复。')) return; const d = gs(r); const i = d.findIndex(x => x.id === s); if (i > -1) { alog('Deleted: "' + d[i].t.substring(0, 22) + '"'); d.splice(i, 1); ss2(r, d); } OP.clear(); rAll(r); }
function togAct(r) { const v = localStorage.getItem('aria_act') !== '0'; localStorage.setItem('aria_act', v ? '0' : '1'); rMN(r); }
function clrLog(r) { if (!confirm(LANG === 'en' ? 'Clear all activity log?' : '确认清空所有操作记录？')) return; localStorage.removeItem('aria_log'); alog(LANG === 'en' ? 'Activity log cleared' : '操作记录已清空'); rAll(r); }
function oAdd(r) { MR = r; ME = null; const s = gs(r); const secs = [...new Set(s.map(x => x.sec))]; document.getElementById('smt').textContent = LANG === 'en' ? 'Add SOP Step' : '新增 SOP 步骤'; ['mT','mW','mD','mDl'].forEach(id => document.getElementById(id).value = ''); document.getElementById('mC').value = ''; document.getElementById('mS').innerHTML = secs.map(s => `<option value="${s}">${s}</option>`).join(''); document.getElementById('sm').classList.add('show'); }
function oEdit(r, i) { MR = r; const s = gs(r); const sop = s[i]; ME = sop.id; const secs = [...new Set(s.map(x => x.sec))]; document.getElementById('smt').textContent = LANG === 'en' ? 'Edit SOP Step' : '编辑 SOP 步骤'; document.getElementById('mT').value = sop.t; document.getElementById('mW').value = sop.w || ''; document.getElementById('mD').value = sop.desc || ''; document.getElementById('mC').value = (sop.cl || []).join('
'); document.getElementById('mDl').value = (sop.del || []).join(', '); document.getElementById('mS').innerHTML = secs.map(s => `<option value="${s}" ${s === sop.sec ? 'selected' : ''}>${s}</option>`).join(''); document.getElementById('sm').classList.add('show'); }
function cSM() { document.getElementById('sm').classList.remove('show'); MR = null; ME = null; }
function saveSM() { const title = document.getElementById('mT').value.trim(); if (!title) { alert('Step title is required'); return; } const s = gs(MR); const sec = document.getElementById('mS').value || 'General'; const who = document.getElementById('mW').value.trim(); const desc = document.getElementById('mD').value.trim(); const cl = document.getElementById('mC').value.split('
').map(x => x.trim()).filter(Boolean); const del = document.getElementById('mDl').value.split(',').map(x => x.trim()).filter(Boolean); if (ME) { const sop = s.find(x => x.id === ME); if (sop) { sop.t = title; sop.sec = sec; sop.w = who; sop.desc = desc; sop.cl = cl; sop.del = del; alog('Edited: "' + title.substring(0, 22) + '"'); } } else { s.push({ id: MR + '_' + Date.now(), sec, t: title, w: who, s: 'todo', desc, cl, del, tasks: [], notes: [] }); alog('Added: "' + title.substring(0, 22) + '"'); } ss2(MR, s); cSM(); rAll(MR); }
function oSec(r) { MR = r; document.getElementById('secn').value = ''; document.getElementById('secm').classList.add('show'); }
function saveSec() { const n = document.getElementById('secn').value.trim(); if (!n) return; const s = gs(MR); s.push({ id: MR + '_' + Date.now(), sec: n, t: 'New step — click ✏ to update', w: '', s: 'todo', desc: 'Add description.', cl: [], del: [], tasks: [], notes: [] }); ss2(MR, s); alog('Added section: "' + n + '"'); document.getElementById('secm').classList.remove('show'); rAll(MR); }

document.getElementById('sm').addEventListener('click', function(e) { if (e.target === this) cSM(); });
document.getElementById('secm').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

// Event delegation for add task/note buttons and Enter key
document.addEventListener('click', function(e) {
  if (!e.target || !e.target.id) return;
  const id = e.target.id;
  if (id.startsWith('abtn_')) { aTask(CUR_AID, id.replace('abtn_', '')); }
  if (id.startsWith('nbtn_')) { aNote(CUR_AID, id.replace('nbtn_', '')); }
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.target && e.target.id && e.target.id.startsWith('ti_')) {
    aTask(CUR_AID, e.target.id.replace('ti_', ''));
  }
});

// Init
rAll('pm');
apLS();
</script>
</body>

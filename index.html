<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA · 新智汇 — SOP Workspace</title>
<style>
:root{
  --navy:#0A1F44;--gold:#C9A84C;--bg:#F4F6FB;--surface:#fff;
  --border:#E2E8F0;--text:#1A202C;--muted:#718096;--subtle:#A0AEC0;
  --green:#22C55E;--amber:#F59E0B;--red:#EF4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

/* TOPBAR */
.topbar{background:var(--navy);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.brand{color:var(--gold);font-size:14px;font-weight:700;letter-spacing:.3px;}
.brand span{color:rgba(255,255,255,.35);font-weight:400;font-size:11px;margin-left:8px;}
.ts-row{display:flex;gap:16px;align-items:center;}
.ts{color:rgba(255,255,255,.5);font-size:11px;}
.ts strong{color:#fff;}
.lang-btn{font-size:11px;padding:4px 11px;border-radius:6px;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);background:transparent;cursor:pointer;font-weight:500;transition:all .15s;}
.lang-btn:hover{background:rgba(255,255,255,.15);color:#fff;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:225px 1fr;min-height:calc(100vh - 52px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;padding-bottom:20px;}
.sb-head{padding:14px 14px 5px;font-size:10px;font-weight:700;color:var(--subtle);text-transform:uppercase;letter-spacing:.6px;}
.rb{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;}
.rb:hover{background:var(--bg);}
.rb.active{background:var(--bg);}
.rb-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.rb-info{flex:1;min-width:0;}
.rb-name{font-size:12px;font-weight:600;}
.rb-pct{font-size:10px;color:var(--muted);}
.rb-bar{height:2px;background:var(--border);border-radius:1px;margin-top:3px;overflow:hidden;}
.rb-fill{height:100%;border-radius:1px;transition:width .3s;}
.sb-div{height:1px;background:var(--border);margin:7px 12px;}
.sb-sum{padding:8px 12px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px;}
.sc{background:var(--bg);border-radius:7px;padding:7px;text-align:center;}
.sc-n{font-size:18px;font-weight:600;}
.sc-l{font-size:10px;color:var(--muted);}

/* MAIN */
.main{padding:20px;overflow-y:auto;}
.rh{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:14px;}
.rh-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.rh-name{font-size:18px;font-weight:700;margin-bottom:3px;}
.rh-sub{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:7px;}
.stk{display:flex;gap:4px;flex-wrap:wrap;}
.st{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600;}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.tbtn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;}
.tbtn:hover{background:var(--bg);}
.tbtn.primary{background:var(--navy);color:var(--gold);border-color:var(--navy);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:13px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center;}
.stat-n{font-size:22px;font-weight:700;}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px;}
.pb{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:13px;}
.pb-m{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px;}
.pb-t{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.pb-f{height:100%;border-radius:3px;transition:width .4s;}

/* TRACE */
.trace-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:13px;}
.trace-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:0;}
.trace-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.trace-btns{display:flex;gap:6px;}
.trace-smb{font-size:11px;padding:2px 9px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;}
.trace-smb.danger{border-color:#FECACA;color:var(--red);}
.trace-list{margin-top:8px;display:flex;flex-direction:column;gap:4px;max-height:90px;overflow-y:auto;}
.trace-item{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:var(--muted);}
.trace-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:4px;}
.trace-time{font-size:10px;color:var(--subtle);margin-left:auto;white-space:nowrap;}

/* PAIN + STABS */
.pain{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;padding:9px 13px;background:var(--surface);border:1px solid var(--border);border-radius:10px;align-items:center;}
.pl{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;margin-right:3px;}
.pt{font-size:11px;padding:2px 8px;border-radius:5px;background:#FFFBEB;color:#92400E;border:1px solid #FCD34D;}
.stabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;}
.stab{font-size:11px;padding:3px 10px;border-radius:20px;color:#fff;font-weight:500;}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:8px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:box-shadow .15s;}
.card:hover{box-shadow:0 2px 10px rgba(0,0,0,.06);}
.ch{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;}
.sn{min-width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px;}
.si{flex:1;}
.st2{font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.4;}
.sw{font-size:11px;color:var(--muted);}
.sr{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.badge{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500;white-space:nowrap;}
.b-done{background:#D1FAE5;color:#065F46;}
.b-wip{background:#FEF3C7;color:#92400E;}
.b-todo{background:#F1F5F9;color:var(--muted);}
.chev{font-size:11px;color:var(--subtle);transition:transform .15s;display:inline-block;}
.chev.op{transform:rotate(90deg);}
.cb{display:none;padding:0 14px 14px 47px;border-top:1px solid var(--border);}
.cb.op{display:block;padding-top:12px;}
.bl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.bt{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:12px;}

/* HELP TOOLTIP */
.help-wrap{position:relative;display:inline-flex;align-items:center;}
.help-ic{width:15px;height:15px;border-radius:50%;background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:9px;font-style:italic;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.help-ic:hover{background:var(--navy);color:var(--gold);border-color:var(--navy);}
.help-tip{display:none;position:absolute;left:20px;top:50%;transform:translateY(-50%);background:var(--navy);color:#fff;font-size:11px;line-height:1.55;padding:8px 12px;border-radius:8px;width:220px;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.2);font-style:normal;font-weight:400;}
.help-tip::before{content:'';position:absolute;left:-5px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:var(--navy);border-left:none;}
.help-wrap:hover .help-tip,.help-ic:focus+.help-tip{display:block;}

/* CHECKLIST */
.cl-list{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.ci{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--muted);line-height:1.5;}
.ckb{width:15px;height:15px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:all .12s;}
.ckb.on{background:var(--green);border-color:var(--green);color:#fff;}

/* TASKS */
.task-section{margin-bottom:12px;}
.task-list{display:flex;flex-direction:column;gap:4px;margin-bottom:7px;}
.task-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border-radius:8px;border:0.5px solid var(--border);}
.task-cb{width:15px;height:15px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:all .12s;}
.task-cb.on{background:var(--green);border-color:var(--green);color:#fff;}
.task-text{flex:1;font-size:12px;color:var(--text);}
.task-text.done{text-decoration:line-through;color:var(--subtle);}
.task-owner{font-size:10px;color:var(--muted);background:var(--surface);padding:1px 7px;border-radius:10px;border:0.5px solid var(--border);}
.task-del{font-size:11px;color:var(--subtle);cursor:pointer;padding:2px 5px;border-radius:4px;background:transparent;border:none;}
.task-del:hover{color:var(--red);background:#FFF5F5;}
.add-task-row{display:flex;gap:6px;}
.add-task-row input{flex:1;padding:6px 10px;border-radius:7px;border:1px solid var(--border);font-size:12px;outline:none;color:var(--text);background:var(--surface);}
.add-task-row input:focus{border-color:var(--navy);}
.add-task-row button{padding:6px 12px;border-radius:7px;background:var(--navy);color:var(--gold);border:none;font-size:11px;font-weight:600;cursor:pointer;}

/* DELIVERABLES */
.dr{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.del{font-size:11px;padding:2px 9px;border-radius:5px;font-weight:500;}

/* TIPS */
.tip{font-size:12px;padding:8px 11px;border-radius:8px;margin-bottom:8px;line-height:1.6;}
.t-aria{background:#EFF6FF;color:#1e40af;border:1px solid #BFDBFE;}
.t-col{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;}
.t-bank{background:#FFF7ED;color:#9a3412;border:1px solid #FED7AA;}

/* CARD ACTIONS */
.acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.btn{font-size:11px;padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .12s;}
.btn:hover{background:var(--bg);}
.btn-outline{background:var(--surface);}
.btn-wip{background:var(--amber);color:#fff;border-color:var(--amber);}
.btn-ai{background:#7C3AED;color:#fff;border-color:#7C3AED;}
.btn-edit{background:var(--navy);color:var(--gold);border-color:var(--navy);}
.btn-del{color:var(--red);border-color:#FECACA;}
.btn-del:hover{background:#FFF5F5;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:100%;max-width:500px;margin:20px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text);}
.field{margin-bottom:12px;}
.field label{font-size:12px;font-weight:500;color:var(--muted);display:block;margin-bottom:4px;}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;outline:none;color:var(--text);font-family:inherit;background:var(--surface);transition:border-color .15s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--navy);}
.field textarea{resize:vertical;min-height:70px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.modal-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;}
.modal-save{background:var(--navy);color:var(--gold);}
.modal-cancel{background:var(--bg);color:var(--text);border:1px solid var(--border);}

.empty-state{text-align:center;padding:24px;color:var(--muted);font-size:13px;}
@media(max-width:700px){.layout{grid-template-columns:1fr;}.sidebar{position:relative;height:auto;}.stats{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">ARIA · 新智汇 <span id="brand-sub">SOP Collaboration Workspace · All Roles · Pilot M1–M2</span></div>
  <div class="ts-row">
    <div class="ts" id="ts-total-lbl">Total <strong id="ts-done">0</strong>/<strong id="ts-tot">0</strong></div>
    <div class="ts">Overall <strong id="ts-pct">0</strong>% <span id="ts-complete-lbl">complete</span></div>
    <div class="ts"><strong id="ts-online">7</strong> <span id="ts-roles-lbl">roles active</span></div>
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">中文</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<!-- SOP Edit Modal -->
<div class="modal-overlay" id="sop-modal">
  <div class="modal">
    <h3 id="sop-modal-title">Edit SOP Step</h3>
    <div class="field">
      <label id="lbl-title">Step Title *</label>
      <input id="edit-title" placeholder="Step title..." />
    </div>
    <div class="field">
      <label id="lbl-section">Section</label>
      <input id="edit-section" placeholder="e.g. Initiation, Planning..." />
    </div>
    <div class="field">
      <label id="lbl-who">Responsible</label>
      <input id="edit-who" placeholder="e.g. PM + BA + Client" />
    </div>
    <div class="field">
      <label id="lbl-desc">Description</label>
      <textarea id="edit-desc" rows="3" placeholder="Step description..."></textarea>
    </div>
    <div class="field">
      <label id="lbl-cl">Checklist (one item per line)</label>
      <textarea id="edit-cl" rows="4" placeholder="Checklist item 1&#10;Checklist item 2&#10;Checklist item 3"></textarea>
    </div>
    <div class="field">
      <label id="lbl-del">Key Deliverables (comma separated)</label>
      <input id="edit-del" placeholder="e.g. Project Charter, Risk Register" />
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-cancel" onclick="closeSopModal()" id="btn-cancel">Cancel</button>
      <button class="modal-btn modal-save" onclick="saveSopModal()" id="btn-save">Save Changes</button>
    </div>
  </div>
</div>

};

function toggleLang() {
  LANG = LANG === 'en' ? 'zh' : 'en';
  localStorage.setItem('aria_lang', LANG);
  document.getElementById('lang-btn').textContent = LANG === 'en' ? '中文' : 'EN';
  renderAll();
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let S = {
  role: localStorage.getItem('aria_role') || 'pm',
  open: new Set(),
  ck: JSON.parse(localStorage.getItem('aria_ck') || '{}'),
  tasks: JSON.parse(localStorage.getItem('aria_tasks') || '{}'),
  sops: JSON.parse(localStorage.getItem('aria_sops') || 'null'),
  trace: JSON.parse(localStorage.getItem('aria_trace') || '{}'),
  traceVisible: JSON.parse(localStorage.getItem('aria_trace_vis') || '{}'),
  editIdx: null,
  editMode: 'edit'
};

// Merge saved SOPs over defaults
function getRoleSops(roleId) {
  if (S.sops && S.sops[roleId]) return S.sops[roleId];
  return R.find(r => r.id === roleId).sops;
}
function saveRoleSops(roleId, sops) {
  if (!S.sops) S.sops = {};
  S.sops[roleId] = sops;
  localStorage.setItem('aria_sops', JSON.stringify(S.sops));
}
function saveTasks() { localStorage.setItem('aria_tasks', JSON.stringify(S.tasks)); }
function saveCk() { localStorage.setItem('aria_ck', JSON.stringify(S.ck)); }
function addTrace(roleId, msg) {
  if (!S.trace[roleId]) S.trace[roleId] = [];
  const now = new Date();
  S.trace[roleId].unshift({
    msg,
    t: now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
    d: now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })
  });
  if (S.trace[roleId].length > 30) S.trace[roleId].length = 30;
  localStorage.setItem('aria_trace', JSON.stringify(S.trace));
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function globalStats() {
  let d = 0, tot = 0;
  R.forEach(r => { const sops = getRoleSops(r.id); sops.forEach(s => { tot++; if (s.s === 'done') d++; }); });
  return { d, t: tot, p: tot ? Math.round(d / tot * 100) : 0 };
}
function getPct(r) {
  const sops = getRoleSops(r.id);
  const d = sops.filter(s => s.s === 'done').length;
  const t = sops.length;
  return { d, t, p: t ? Math.round(d / t * 100) : 0 };
}
function isCk(roleId, si, ci) {
  return !!(S.ck[roleId] && S.ck[roleId][si] && S.ck[roleId][si][ci]);
}
function hlp(tip) {
  return `<span class="help-wrap"><span class="help-ic">i</span><span class="help-tip">${tip}</span></span>`;
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function sw(id) {
  S.role = id;
  S.open = new Set();
  localStorage.setItem('aria_role', id);
  renderAll();
}
function tog(i) {
  S.open.has(i) ? S.open.delete(i) : S.open.add(i);
  renderMain();
}
function tick(si, ci) {
  const r = S.role;
  if (!S.ck[r]) S.ck[r] = {};
  if (!S.ck[r][si]) S.ck[r][si] = {};
  S.ck[r][si][ci] = !S.ck[r][si][ci];
  saveCk();
  const role = R.find(x => x.id === r);
  const sops = getRoleSops(r);
  addTrace(r, `Checklist: "${sops[si].t.substring(0,30)}..." item ${ci+1} ${S.ck[r][si][ci] ? '✓' : '☐'}`);
  renderMain();
}
function setSt(i, st) {
  const r = S.role;
  const sops = getRoleSops(r);
  const old = sops[i].s;
  sops[i].s = st;
  saveRoleSops(r, sops);
  const labels = { done: t('done'), wip: t('wip'), todo: t('todo') };
  addTrace(r, `Status: "${sops[i].t.substring(0,30)}..." → ${labels[st] || st}`);
  renderAll();
}

// TASKS
function getTaskKey(roleId, si) { return `${roleId}_${si}`; }
function addTask(si) {
  const inp = document.getElementById(`task-inp-${si}`);
  if (!inp || !inp.value.trim()) return;
  const key = getTaskKey(S.role, si);
  if (!S.tasks[key]) S.tasks[key] = [];
  const task = { text: inp.value.trim(), done: false, ts: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) };
  S.tasks[key].push(task);
  saveTasks();
  const sops = getRoleSops(S.role);
  addTrace(S.role, `Task added: "${task.text.substring(0,30)}" on "${sops[si].t.substring(0,25)}..."`);
  inp.value = '';
  renderMain();
}
function toggleTask(si, ti) {
  const key = getTaskKey(S.role, si);
  if (!S.tasks[key] || !S.tasks[key][ti]) return;
  S.tasks[key][ti].done = !S.tasks[key][ti].done;
  saveTasks();
  const sops = getRoleSops(S.role);
  addTrace(S.role, `Task ${S.tasks[key][ti].done ? '✓' : '☐'}: "${S.tasks[key][ti].text.substring(0,25)}..."`);
  renderMain();
}
function deleteTask(si, ti) {
  if (!confirm(t('deleteTaskConfirm'))) return;
  const key = getTaskKey(S.role, si);
  if (!S.tasks[key]) return;
  const txt = S.tasks[key][ti].text;
  S.tasks[key].splice(ti, 1);
  saveTasks();
  const sops = getRoleSops(S.role);
  addTrace(S.role, `Task deleted: "${txt.substring(0,25)}..."`);
  renderMain();
}

// SOP EDIT/ADD
function openEditSop(i) {
  const sops = getRoleSops(S.role);
  const sop = sops[i];
  S.editIdx = i;
  S.editMode = 'edit';
  document.getElementById('sop-modal-title').textContent = t('editModalTitle');
  document.getElementById('btn-save').textContent = t('btnSave');
  document.getElementById('btn-cancel').textContent = t('btnCancel');
  document.getElementById('edit-title').value = sop.t;
  document.getElementById('edit-section').value = sop.sec;
  document.getElementById('edit-who').value = sop.w;
  document.getElementById('edit-desc').value = sop.desc;
  document.getElementById('edit-cl').value = sop.cl.join('\n');
  document.getElementById('edit-del').value = sop.del.join(', ');
  document.getElementById('sop-modal').classList.add('show');
}
function openAddSop() {
  S.editIdx = null;
  S.editMode = 'add';
  const role = R.find(r => r.id === S.role);
  const secs = [...new Set(getRoleSops(S.role).map(s => s.sec))];
  document.getElementById('sop-modal-title').textContent = t('addModalTitle');
  document.getElementById('btn-save').textContent = t('btnSave');
  document.getElementById('btn-cancel').textContent = t('btnCancel');
  document.getElementById('edit-title').value = '';
  document.getElementById('edit-section').value = secs[0] || '';
  document.getElementById('edit-who').value = role.name;
  document.getElementById('edit-desc').value = '';
  document.getElementById('edit-cl').value = '';
  document.getElementById('edit-del').value = '';
  document.getElementById('sop-modal').classList.add('show');
}
function closeSopModal() {
  document.getElementById('sop-modal').classList.remove('show');
}
function saveSopModal() {
  const title = document.getElementById('edit-title').value.trim();
  if (!title) { alert(t('lblTitle') + ' is required'); return; }
  const sops = getRoleSops(S.role);
  const updated = {
    sec: document.getElementById('edit-section').value.trim() || 'General',
    t: title,
    w: document.getElementById('edit-who').value.trim(),
    s: S.editMode === 'add' ? 'todo' : sops[S.editIdx].s,
    desc: document.getElementById('edit-desc').value.trim(),
    cl: document.getElementById('edit-cl').value.split('\n').map(x => x.trim()).filter(Boolean),
    del: document.getElementById('edit-del').value.split(',').map(x => x.trim()).filter(Boolean),
    aria: S.editMode === 'add' ? '' : (sops[S.editIdx].aria || ''),
    col: S.editMode === 'add' ? '' : (sops[S.editIdx].col || ''),
    tip: S.editMode === 'add' ? '' : (sops[S.editIdx].tip || ''),
  };
  if (S.editMode === 'edit') {
    sops[S.editIdx] = updated;
    addTrace(S.role, `SOP edited: "${title.substring(0,30)}..."`);
  } else {
    sops.push(updated);
    addTrace(S.role, `SOP added: "${title.substring(0,30)}..."`);
  }
  saveRoleSops(S.role, sops);
  closeSopModal();
  renderAll();
}
function deleteSop(i) {
  if (!confirm(t('deleteConfirm'))) return;
  const sops = getRoleSops(S.role);
  const title = sops[i].t;
  sops.splice(i, 1);
  saveRoleSops(S.role, sops);
  addTrace(S.role, `SOP deleted: "${title.substring(0,30)}..."`);
  S.open.delete(i);
  renderAll();
}

// TRACE
function toggleTrace(roleId) {
  S.traceVisible[roleId] = !S.traceVisible[roleId];
  if (S.traceVisible[roleId] === undefined) S.traceVisible[roleId] = false;
  localStorage.setItem('aria_trace_vis', JSON.stringify(S.traceVisible));
  renderMain();
}
function clearTrace(roleId) {
  if (!confirm(t('traceClear') + '?')) return;
  S.trace[roleId] = [];
  localStorage.setItem('aria_trace', JSON.stringify(S.trace));
  renderMain();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderAll() {
  renderSidebar();
  renderMain();
  // update topbar lang
  document.getElementById('lang-btn').textContent = LANG === 'en' ? '中文' : 'EN';
  document.getElementById('brand-sub').textContent = t('brandSub');
  document.getElementById('ts-complete-lbl').textContent = t('completeLbl');
  document.getElementById('ts-roles-lbl').textContent = t('rolesLbl');
  // update modal labels
  document.getElementById('lbl-title').textContent = t('lblTitle');
  document.getElementById('lbl-section').textContent = t('lblSection');
  document.getElementById('lbl-who').textContent = t('lblWho');
  document.getElementById('lbl-desc').textContent = t('lblDesc');
  document.getElementById('lbl-cl').textContent = t('lblCl');
  document.getElementById('lbl-del').textContent = t('lblDel');
}

function renderSidebar() {
  const { d, tot: total, p } = globalStats();
  document.getElementById('ts-done').textContent = d;
  document.getElementById('ts-tot').textContent = total;
  document.getElementById('ts-pct').textContent = p;
  const wip = R.reduce((a, r) => a + getRoleSops(r.id).filter(s => s.s === 'wip').length, 0);
  const todo = R.reduce((a, r) => a + getRoleSops(r.id).filter(s => s.s === 'todo').length, 0);
  document.getElementById('sidebar').innerHTML = `
    <div class="sb-head">${t('deliveryRoles')}</div>
    ${R.map(r => {
      const { d, t: tot, p } = getPct(r);
      return `<div class="rb ${S.role === r.id ? 'active' : ''}" onclick="sw('${r.id}')" style="${S.role === r.id ? 'border-left-color:' + r.color + ';' : ''}">
        <div class="rb-icon" style="background:${r.light};">${r.icon}</div>
        <div class="rb-info">
          <div class="rb-name" style="${S.role === r.id ? 'color:' + r.color + ';' : ''}">${r.name}</div>
          <div class="rb-pct">${d}/${tot} · ${p}%</div>
          <div class="rb-bar"><div class="rb-fill" style="width:${p}%;background:${r.color};"></div></div>
        </div>
      </div>`;
    }).join('')}
    <div class="sb-div"></div>
    <div class="sb-sum">
      <div style="font-size:10px;font-weight:700;color:var(--subtle);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;">${t('overallProgress')}</div>
      <div class="sg">
        <div class="sc"><div class="sc-n" style="color:var(--navy);">${total}</div><div class="sc-l">${t('steps')}</div></div>
        <div class="sc"><div class="sc-n" style="color:var(--green);">${d}</div><div class="sc-l">${t('done')}</div></div>
        <div class="sc"><div class="sc-n" style="color:var(--amber);">${wip}</div><div class="sc-l">${t('wip')}</div></div>
        <div class="sc"><div class="sc-n" style="color:var(--subtle);">${todo}</div><div class="sc-l">${t('todo')}</div></div>
      </div>
    </div>`;
}

function renderMain() {
  const r = R.find(x => x.id === S.role);
  const sops = getRoleSops(S.role);
  const { d, t: tot, p } = getPct(r);
  const wip = sops.filter(s => s.s === 'wip').length;
  const todo = sops.filter(s => s.s === 'todo').length;
  const secs = [...new Set(sops.map(s => s.sec))];
  const traceItems = S.trace[S.role] || [];
  const traceOpen = S.traceVisible[S.role] !== false;

  const rh = `<div class="rh" style="border-left:4px solid ${r.color};">
    <div class="rh-av" style="background:${r.light};">${r.icon}</div>
    <div style="flex:1;">
      <div class="rh-name" style="color:${r.color};">${r.full}</div>
      <div class="rh-sub">${r.sub}</div>
      <div class="stk">${r.stack.map(s => `<span class="st" style="background:${s.b};color:${s.f};">${s.l}</span>`).join('')}</div>
    </div>
  </div>`;

  const toolbar = `<div class="toolbar">
    <button class="tbtn primary" onclick="openAddSop()">${t('addStep')}</button>
  </div>`;

  const stats = `<div class="stats">
    <div class="stat"><div class="stat-n" style="color:${r.color};">${tot}</div><div class="stat-l">${t('sopSteps')}</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green);">${d}</div><div class="stat-l">${t('completed')}</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--amber);">${wip}</div><div class="stat-l">${t('inProgress')}</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--subtle);">${todo}</div><div class="stat-l">${t('todo')}</div></div>
  </div>`;

  const pb = `<div class="pb">
    <div class="pb-m"><span style="color:${r.color};">${r.full} — ${t('sopCompletion')}</span><span>${d}/${tot} · ${p}%</span></div>
    <div class="pb-t"><div class="pb-f" style="width:${p}%;background:${r.color};"></div></div>
  </div>`;

  // TRACE BOX
  const traceHtml = `<div class="trace-box">
    <div class="trace-hd">
      <div class="trace-title">${t('traceTitle')} ${hlp(t('helpTrace'))}</div>
      <div class="trace-btns">
        ${traceItems.length ? `<button class="trace-smb danger" onclick="clearTrace('${S.role}')">${t('traceClear')}</button>` : ''}
        <button class="trace-smb" onclick="toggleTrace('${S.role}')">${traceOpen ? t('traceHide') : t('traceShow')}</button>
      </div>
    </div>
    ${traceOpen ? `<div class="trace-list">${traceItems.length
      ? traceItems.map(item => `<div class="trace-item"><div class="trace-dot"></div><span><strong>${item.d} ${item.t}</strong> — ${item.msg}</span></div>`).join('')
      : `<div style="font-size:11px;color:var(--subtle);padding:4px 0;">${t('traceEmpty')}</div>`
    }</div>` : ''}
  </div>`;

  const pain = `<div class="pain">
    <span class="pl">${t('painPoints')}</span>
    ${r.pain.map(p => `<span class="pt">${p}</span>`).join('')}
  </div>`;

  const stabs = `<div class="stabs">${secs.map(s => `<span class="stab" style="background:${r.color};">${s}</span>`).join('')}</div>`;

  const cards = sops.length === 0
    ? `<div class="empty-state">${t('noSops')}</div>`
    : sops.map((sop, i) => {
        const op = S.open.has(i);
        const bc = sop.s === 'done' ? 'b-done' : sop.s === 'wip' ? 'b-wip' : 'b-todo';
        const bl = sop.s === 'done' ? t('done') : sop.s === 'wip' ? t('wip') : t('todo');
        const cc = sop.cl.filter((_, ci) => isCk(S.role, i, ci)).length;
        const taskKey = getTaskKey(S.role, i);
        const tasks = S.tasks[taskKey] || [];
        const taskDone = tasks.filter(t => t.done).length;
        const bankTip = sop.tip ? `<div class="tip t-bank"><strong>${t('bankingCtx')}:</strong> ${sop.tip}</div>` : '';

        // Tasks HTML
        const tasksHtml = `<div class="task-section">
          <div class="bl">${t('tasks')} (${taskDone}/${tasks.length}) ${hlp(t('helpTasks'))}</div>
          ${tasks.length > 0 ? `<div class="task-list">${tasks.map((task, ti) => `
            <div class="task-item">
              <div class="task-cb ${task.done ? 'on' : ''}" onclick="toggleTask(${i},${ti})">${task.done ? '✓' : ''}</div>
              <div class="task-text ${task.done ? 'done' : ''}">${task.text}</div>
              <button class="task-del" onclick="deleteTask(${i},${ti})">✕</button>
            </div>`).join('')}</div>` : `<div style="font-size:11px;color:var(--subtle);margin-bottom:6px;">${t('noTasks')}</div>`}
          <div class="add-task-row">
            <input id="task-inp-${i}" placeholder="${t('addTask')}" onkeydown="if(event.key==='Enter')addTask(${i})" />
            <button onclick="addTask(${i})">${t('addBtn')}</button>
          </div>
        </div>`;

        return `<div class="card">
          <div class="ch" onclick="tog(${i})">
            <div class="sn" style="background:${r.color};">${i+1}</div>
            <div class="si">
              <div class="st2">${sop.t}</div>
              <div class="sw">${sop.w} · ${sop.sec} · ${cc}/${sop.cl.length} ${t('checklist').toLowerCase()} · ${taskDone}/${tasks.length} ${t('tasks').toLowerCase()}</div>
            </div>
            <div class="sr">
              <span class="badge ${bc}">${bl}</span>
              <span class="chev ${op ? 'op' : ''}">▶</span>
            </div>
          </div>
          <div class="cb ${op ? 'op' : ''}">
            <div class="bl">Overview</div>
            <div class="bt">${sop.desc}</div>

            <div class="bl">${t('checklist')} (${cc}/${sop.cl.length}) ${hlp(t('helpChecklist'))}</div>
            <div class="cl-list">${sop.cl.map((c, ci) => `
              <div class="ci">
                <div class="ckb ${isCk(S.role, i, ci) ? 'on' : ''}" onclick="tick(${i},${ci})">${isCk(S.role, i, ci) ? '✓' : ''}</div>
                <span style="${isCk(S.role, i, ci) ? 'text-decoration:line-through;opacity:0.5;' : ''}">${c}</span>
              </div>`).join('')}
            </div>

            <div class="bl">${t('deliverables')} ${hlp(t('helpDeliverables'))}</div>
            <div class="dr">${sop.del.map(d => `<span class="del" style="background:${r.light};color:${r.color};">${d}</span>`).join('')}</div>

            ${tasksHtml}

            ${sop.aria ? `<div class="tip t-aria"><strong>${t('ariaAssist')}:</strong> ${sop.aria}</div>` : ''}
            ${sop.col ? `<div class="tip t-col"><strong>${t('crossRole')}:</strong> ${sop.col}</div>` : ''}
            ${bankTip}

            <div class="acts">
              <button class="btn ${sop.s === 'done' ? '' : 'btn-outline'}" style="${sop.s === 'done' ? 'background:' + r.color + ';color:#fff;border-color:' + r.color + ';' : ''}" onclick="setSt(${i},'done')">${t('markDone')}</button>
              <button class="btn ${sop.s === 'wip' ? 'btn-wip' : ''}" onclick="setSt(${i},'wip')">${t('inProgressBtn')}</button>
              <button class="btn" onclick="setSt(${i},'todo')">${t('resetBtn')}</button>
              <button class="btn btn-edit" onclick="openEditSop(${i})" style="margin-left:auto;">${t('editStep')} ${hlp(t('helpEdit'))}</button>
              <button class="btn btn-del" onclick="deleteSop(${i})">${t('deleteStep')}</button>
            </div>
          </div>
        </div>`;
      }).join('');

  document.getElementById('main').innerHTML = rh + toolbar + stats + pb + traceHtml + pain + stabs + `<div class="cards">${cards}</div>`;
}

// Modal close on overlay click
document.getElementById('sop-modal').addEventListener('click', function(e) {
  if (e.target === this) closeSopModal();
});

// Init
renderAll();
</script>
</body>
</html>
